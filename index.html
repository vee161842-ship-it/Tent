<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Seating Real-time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap');
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #020617;
            color: white;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2rem;
        }
        .chalkboard {
            background: rgba(30, 41, 59, 0.5);
            border: 4px solid rgba(71, 85, 105, 0.5);
            border-radius: 1.5rem;
            height: 8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .chalkboard-text {
            color: rgba(100, 116, 139, 0.8);
            font-size: clamp(1.5rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: 1rem;
            text-align: center;
        }
        .hide { display: none !important; }
        .seat-btn { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            touch-action: manipulation;
        }
        .seat-btn:active { transform: scale(0.9); }
        .seat-btn:hover:not(:disabled) { filter: brightness(1.2); }
    </style>
</head>
<body>
    <div id="app">
        <!-- หน้า Login -->
        <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md glass-panel p-10 rounded-[3rem] shadow-2xl border border-white/5">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 bg-blue-600/20 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-blue-500/30">
                        <i data-lucide="armchair" class="text-blue-500 w-10 h-10"></i>
                    </div>
                    <h1 class="text-3xl font-black">ระบบจองที่นั่ง</h1>
                    <p class="text-slate-400 mt-1 uppercase text-[10px] tracking-widest">Smart Classroom v1.0</p>
                </div>
                <div class="space-y-4">
                    <p class="text-center text-sm text-slate-500">กรอกเลขที่นักเรียนของคุณ (1-40)</p>
                    <input type="number" id="input-no" 
                           class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl text-center text-5xl font-black outline-none focus:border-blue-500/50"
                           placeholder="00">
                    <button onclick="login()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all text-white">
                        ยืนยันและเข้าสู่ห้องเรียน
                    </button>
                </div>
            </div>
        </div>

        <!-- หน้า Classroom -->
        <div id="main-screen" class="hide min-h-screen p-4 md:p-8">
            <div class="max-w-6xl mx-auto">
                <header class="flex justify-between items-center glass-panel p-4 rounded-3xl mb-8 sticky top-4 z-50 shadow-2xl">
                    <div class="flex items-center gap-4">
                        <div id="user-badge" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-xl"></div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-500 uppercase">กำลังใช้งาน</p>
                            <p id="user-name" class="font-bold text-white text-sm"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <div id="sync-status" class="flex items-center gap-2 px-3 py-1.5 bg-slate-800 rounded-full text-[10px] font-bold text-slate-400">
                            <span id="sync-dot" class="w-2 h-2 bg-yellow-500 rounded-full"></span>
                            <span id="sync-text">CONNECTING</span>
                        </div>
                        <button onclick="location.reload()" class="p-2 hover:bg-red-500/20 rounded-lg text-slate-500 hover:text-red-500 transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </header>

                <div class="relative bg-slate-900/40 border border-white/5 rounded-[3rem] p-6 md:p-12 overflow-x-auto shadow-2xl">
                    <!-- กระดาน -->
                    <div class="flex justify-center mb-16 border-b border-white/5 pb-12">
                        <div class="w-full max-w-lg">
                            <div class="chalkboard">
                                <span class="chalkboard-text">กระดาน</span>
                            </div>
                        </div>
                    </div>

                    <!-- ผังที่นั่ง -->
                    <div id="seat-container" class="seat-grid min-w-[800px]"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // ข้อมูล Config จาก Firebase ของคุณ (อัปเดตตามรูปภาพแล้ว)
        // ---------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyB3_qq3-CHYUk3UpcvhEi8YfFBgkxs3efc",
            authDomain: "classroom-settings.firebaseapp.com",
            projectId: "classroom-settings",
            storageBucket: "classroom-settings.firebasestorage.app",
            messagingSenderId: "841394229671",
            appId: "1:841394229671:web:ec28e831c99b1915482682",
            measurementId: "G-WSC4MWDLVC"
        };

        const STUDENT_LIST = {
            "1": "ด.ช.กรวัฒน์", "2": "ด.ช.ชนพัฒน์", "3": "ด.ช.ณัฐกฤต", "4": "ด.ช.ณัฐนันท์",
            "5": "ด.ช.ณัฐสิทธิ์", "6": "ด.ช.ดนย์ศิรา", "7": "ด.ช.ต้นแรม", "8": "ด.ช.เตชิษฐ์",
            "17": "ด.ช.พีระพล", "3205": "คุณครูผู้ดูแล"
        };

        // เริ่มต้น Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let myNo = null;
        let seatsData = {};
        let isProcessing = false;

        async function login() {
            const val = document.getElementById('input-no').value;
            if (val && (val >= 1 && val <= 40)) {
                myNo = val;
                document.getElementById('login-screen').classList.add('hide');
                document.getElementById('main-screen').classList.remove('hide');
                document.getElementById('user-badge').innerText = myNo;
                document.getElementById('user-name').innerText = STUDENT_LIST[val] || `นักเรียนเลขที่ ${val}`;
                
                try {
                    await auth.signInAnonymously();
                    startSync();
                } catch (e) {
                    alert("การเชื่อมต่อล้มเหลว กรุณาตรวจสอบอินเทอร์เน็ต");
                }
            } else {
                alert("กรุณาระบุเลขที่ 1-40");
            }
        }

        function startSync() {
            // ฟังข้อมูลแบบ Real-time จาก Collection ชื่อ 'seats'
            db.collection("seats").onSnapshot((snapshot) => {
                seatsData = {};
                snapshot.forEach(doc => {
                    seatsData[doc.id] = doc.data();
                });
                render();
                updateStatus('LIVE', 'bg-green-500');
            }, (err) => {
                console.error(err);
                updateStatus('ERROR', 'bg-red-500');
            });
        }

        function updateStatus(text, color) {
            document.getElementById('sync-text').innerText = text;
            document.getElementById('sync-dot').className = `w-2 h-2 rounded-full ${color}`;
        }

        function render() {
            const container = document.getElementById('seat-container');
            container.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 5; c++) {
                    const pair = document.createElement('div');
                    pair.className = "flex bg-slate-950/60 border border-white/5 rounded-2xl overflow-hidden shadow-lg";
                    pair.appendChild(createSeat(r, c, 'L'));
                    pair.appendChild(createSeat(r, c, 'R'));
                    container.appendChild(pair);
                }
            }
            lucide.createIcons();
        }

        function createSeat(r, c, side) {
            const id = `${r}-${c}-${side}`;
            const data = seatsData[id];
            const isMine = data && data.no == myNo;
            
            const btn = document.createElement('button');
            btn.className = `flex-1 h-20 flex flex-col items-center justify-center seat-btn relative`;
            
            if (data) {
                btn.classList.add(isMine ? 'bg-blue-600' : 'bg-emerald-600/40');
                btn.innerHTML = `
                    <i data-lucide="armchair" class="w-5 h-5 mb-1 ${isMine ? 'text-white' : 'text-emerald-400'}"></i>
                    <p class="text-[10px] font-black">${isMine ? 'ME' : data.no}</p>
                `;
            } else {
                btn.classList.add('text-slate-800', 'hover:bg-blue-500/10');
                btn.innerHTML = `<i data-lucide="armchair" class="opacity-10 w-4 h-4"></i>`;
                btn.onclick = () => reserve(id);
            }
            return btn;
        }

        async function reserve(seatId) {
            if (isProcessing) return;
            
            // ตรวจสอบว่าจองไปหรือยัง (ห้ามจองซ้ำ)
            const alreadyReserved = Object.values(seatsData).find(s => s.no == myNo);
            if (alreadyReserved) {
                alert("คุณจองที่นั่งไปแล้วครับ!");
                return;
            }

            isProcessing = true;
            try {
                await db.collection("seats").doc(seatId).set({
                    no: myNo,
                    name: STUDENT_LIST[myNo] || `นักเรียนเลขที่ ${myNo}`,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (e) {
                alert("เกิดข้อผิดพลาดในการจอง กรุณาลองใหม่");
            } finally {
                isProcessing = false;
            }
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
